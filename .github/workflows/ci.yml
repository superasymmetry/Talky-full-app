name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  node-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.17.1'

    - name: Install dependencies
      run: cd talky-app && npm install

    - name: Execute tests
      run: cd talky-app && npm test

  python-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: server/requirements.txt

    - name: Install dependencies
      run: pip install -r server/requirements.txt pytest

    - name: Run unit tests
      working-directory: server
      env:
        MONGO_URI: mongodb://localhost:27017/talky_test
        GROQ_API_KEY: dummy
        AUTH0_DOMAIN: dummy.auth0.com
        AUTH0_AUDIENCE: dummy
      run: python -m pytest tests/unit/ -v
