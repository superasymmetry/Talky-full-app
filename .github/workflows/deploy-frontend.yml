name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'talky-app/**'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: talky-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: talky-app

      - name: Lint
        run: npm run lint
        working-directory: talky-app

      - name: Build
        run: npm run build
        working-directory: talky-app
        env:
          VITE_API_URL: https://api.talkwithtalky.org
          VITE_AUTH0_DOMAIN: dev-d4hp725rjhg8hatu.us.auth0.com
          VITE_AUTH0_CLIENT_ID: ${{ secrets.VITE_AUTH0_CLIENT_ID }}
          VITE_AUTH0_AUDIENCE: https://api.talky.app

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: talky-app/dist/
          retention-days: 1

  deploy:
    name: Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Sync to S3
        run: aws s3 sync dist/ s3://talky-frontend-siyu --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E2CUEJE4UKXLC7 \
            --paths "/*"
